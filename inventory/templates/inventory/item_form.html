{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h4 class="card-title mb-3">Add or Update Component</h4>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
        </form>
    </div>
</div>
{% endblock %}
